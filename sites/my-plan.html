<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FreeFitFuel My Plan</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="site-header"></div>
<script src="/js/header-loader.js" defer></script>

<main class="wrap">

<section class="section">
<h1>My Plan</h1>
<p class="lead">Your personalised adaptive training plan.</p>
</section>

<section class="section" id="coach-panel">
<h2>Coach Feedback</h2>
<div id="coach-output"></div>
</section>

<section class="section">
<h2>Your Plan</h2>
<div id="plan-output"></div>
</section>

</main>

<script src="fff-coach-engine.js"></script>

<script>
function generatePlan(){
  let plan = {
    days: ["Push","Pull","Legs"],
    intensity: 1,
    volume: 1
  }

  plan = applyCoachingAdjustments(plan)

  return plan
}

function renderPlan(){
  const plan = generatePlan()
  const el = document.getElementById("plan-output")

  el.innerHTML = `
    <p><strong>Days:</strong> ${plan.days.join(", ")}</p>
    <p><strong>Intensity:</strong> ${plan.intensity.toFixed(2)}</p>
    <p><strong>Volume:</strong> ${plan.volume.toFixed(2)}</p>
  `
}

function renderCoach(){
  const container = document.getElementById('coach-output')
  const insights = COACH.analyse()

  if(!insights.length){
    container.innerHTML = "<p>No adjustments needed.</p>"
    return
  }

  container.innerHTML = insights.map(i => `<div>${i.msg}</div>`).join('')
}

function applyCoachingAdjustments(plan){
  const insights = COACH.analyse()

  insights.forEach(i=>{
    if(i.type === "fatigue") plan.volume *= 0.8
    if(i.type === "progress") plan.intensity += 0.1
    if(i.type === "nudge") plan.days = plan.days.slice(0,2)
  })

  return plan
}

renderCoach()
renderPlan()
</script>

</body>
</html>
