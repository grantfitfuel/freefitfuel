<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>My Plan — FreeFitFuel</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="img/freefitfuel-logo.svg">

<style>
:root{
  --bg:#0b0f14;
  --card:#111418;
  --stroke:#1f2630;
  --accent:#FF6A00;
  --text:#e6e6ea;
  --muted:#a9a9b3;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter,system-ui,Arial,sans-serif;
  margin:0;
}

.wrap{max-width:1100px;margin:0 auto;padding:20px}

h1{margin:.3rem 0}
.section{
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:14px;
  padding:16px;
  margin:14px 0;
}

.grid{
  display:grid;
  gap:10px;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
}

input,select{
  width:100%;
  padding:8px;
  background:#0b0f14;
  border:1px solid var(--stroke);
  border-radius:8px;
  color:var(--text);
}

.btn{
  background:var(--accent);
  color:#fff;
  border:0;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn.secondary{
  background:#222;
}

.stage{
  border:1px solid var(--stroke);
  border-radius:10px;
  padding:12px;
  margin-top:10px;
}

.exercise{
  padding:6px 0;
  border-bottom:1px dashed #222;
}
.exercise:last-child{border-bottom:0}

.meta{color:var(--muted);font-size:.9rem}

.coach{
  border-left:4px solid var(--accent);
  padding:10px;
  background:#161616;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="site-header"></div>
<script src="/js/header-loader.js"></script>

<main class="wrap">

<h1>My Plan</h1>
<p class="meta">Your personalised training, nutrition and recovery system.</p>

<!-- =======================
     SETUP / INPUT
======================= -->
<section class="section">

<h2>Setup</h2>

<div class="grid">

<label>Sex
<select id="sex">
<option value="male">Male</option>
<option value="female">Female</option>
</select>
</label>

<label>Age
<input id="age" type="number" value="30">
</label>

<label>Height (cm)
<input id="height" type="number" value="175">
</label>

<label>Weight (kg)
<input id="weight" type="number" value="75">
</label>

<label>Activity
<select id="activity">
<option value="1.2">Sedentary</option>
<option value="1.375">Light</option>
<option value="1.55" selected>Moderate</option>
<option value="1.725">High</option>
<option value="1.9">Athlete</option>
</select>
</label>

<label>Body Fat %
<input id="bf" type="number" step="0.1">
</label>

<label>Target Body Fat %
<input id="targetBF" type="number" step="0.5">
</label>

<label>Goal
<select id="goal">
<option value="cut">Cut</option>
<option value="transform">Transform</option>
<option value="maintain">Maintain</option>
<option value="bulk">Bulk</option>
</select>
</label>

</div>

<br>

<button class="btn" id="generate">Generate Plan</button>

</section>

<!-- =======================
     COACH
======================= -->
<section class="section">
<h2>Coach</h2>
<div id="coach" class="coach">Generate a plan to begin.</div>
</section>

<!-- =======================
     PLAN OUTPUT
======================= -->
<section class="section">
<h2>Your Plan</h2>
<div id="plan"></div>
</section>

</main>

<!-- =======================
     ENGINE
======================= -->
<script src="/js/engine/fff-state.js"></script>
<script src="/js/engine/fff-exercise-db.js"></script>
<script src="/js/engine/fff-recovery.js"></script>
<script src="/js/engine/fff-mind.js"></script>
<script src="/js/engine/fff-roadmap.js"></script>
<script src="/js/engine/fff-training.js"></script>
<script src="/js/engine/fff-messaging.js"></script>
<script src="/js/engine/fff-core.js"></script>

<script>

/* =========================
   CORE GENERATOR
========================= */

function buildPlan(data){

  const stages = [];

  const flow = {
    cut:["cut","transform","maintain"],
    transform:["transform","maintain"],
    maintain:["maintain"],
    bulk:["bulk"]
  };

  flow[data.goal].forEach(stage => {

    stages.push({
      name:stage,
      days:[
        {name:"Push",ex:["Push-up","DB Press","Lateral Raise"]},
        {name:"Pull",ex:["Row","Pull-up","Curl"]},
        {name:"Legs",ex:["Squat","RDL","Lunge"]},
        {name:"Core",ex:["Plank","Carry"]}
      ]
    });

  });

  return {stages};

}

/* =========================
   SAVE + RENDER
========================= */

function generate(){

  const data = {
    sex:val("sex"),
    age:num("age"),
    height:num("height"),
    weight:num("weight"),
    activity:num("activity"),
    bf:num("bf"),
    targetBF:num("targetBF"),
    goal:val("goal")
  };

  const roadmap = buildPlan(data);

  localStorage.setItem("fff.roadmap.plan.v1", JSON.stringify(roadmap));

  render(roadmap);
  coach(roadmap);

}

/* =========================
   RENDER
========================= */

function render(r){

  const el = document.getElementById("plan");
  el.innerHTML = "";

  r.stages.forEach(stage => {

    const s = document.createElement("div");
    s.className = "stage";

    s.innerHTML = `<h3>${stage.name.toUpperCase()}</h3>`;

    stage.days.forEach(day => {

      const d = document.createElement("div");

      d.innerHTML = `<strong>${day.name}</strong>`;

      day.ex.forEach(e => {
        const ex = document.createElement("div");
        ex.className = "exercise";
        ex.textContent = e;
        d.appendChild(ex);
      });

      s.appendChild(d);

    });

    el.appendChild(s);

  });

}

/* =========================
   COACH ENGINE (v1)
========================= */

function coach(r){

  const msg = document.getElementById("coach");

  const variations = [
    "Start steady. Build consistency first.",
    "Focus on clean reps, not chasing numbers.",
    "Progress comes from showing up repeatedly.",
    "Keep effort controlled this week.",
    "Small wins compound. Stay consistent."
  ];

  msg.textContent = variations[Math.floor(Math.random()*variations.length)];

}

/* =========================
   HELPERS
========================= */

function val(id){return document.getElementById(id).value;}
function num(id){return Number(val(id))||0;}

/* =========================
   INIT LOAD
========================= */

(function(){

  const raw = localStorage.getItem("fff.roadmap.plan.v1");
  if(raw){
    try{
      const r = JSON.parse(raw);
      render(r);
      coach(r);
    }catch(e){}
  }

})();

document.getElementById("generate").onclick = generate;

</script>

</body>
</html>
